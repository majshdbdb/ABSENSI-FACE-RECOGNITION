<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi SMK Tamansiswa Mojoagung</title>
    <link rel="icon" href="/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* ==== Palet: institusi vokasi + warisan Tamansiswa (1922) ==== */
            --maroon-900: #3E1013;
            --maroon-800: #4A1418;
            --maroon-700: #6B1E23;
            --maroon-600: #7D2A2F;
            --maroon-500: #93373D;
            --gold-600: #A87F2E;
            --gold-500: #C89B3C;
            --gold-300: #E0C275;
            --gold-100: #F3E6C4;
            --parchment-50: #F6F1E7;
            --paper: #FDFBF6;
            --ink-900: #241416;
            --ink-600: #5C4A4C;
            --ink-400: #8C7A7C;
            --line: #E4D9C8;
            --success-600: #3F7856;
            --success-100: #E1EEE6;
            --danger-600: #B23A2E;
            --danger-100: #F4DEDA;
            --info-600: #3E6E8E;
            --info-100: #E3EDF2;

            --font-display: 'Fraunces', Georgia, serif;
            --font-body: 'Plus Jakarta Sans', -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'Courier New', monospace;

            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --shadow-sm: 0 2px 8px rgba(62, 16, 19, 0.08);
            --shadow-md: 0 8px 28px rgba(62, 16, 19, 0.14);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: var(--parchment-50);
            color: var(--ink-900);
            line-height: 1.5;
        }

        /* Tekstur halus latar belakang -- pola geometris tipis, bukan batik spesifik */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.05;
            background-image:
                repeating-linear-gradient(45deg, var(--maroon-700) 0, var(--maroon-700) 1px, transparent 1px, transparent 22px),
                repeating-linear-gradient(-45deg, var(--maroon-700) 0, var(--maroon-700) 1px, transparent 1px, transparent 22px);
        }

        #root { position: relative; z-index: 1; min-height: 100vh; }

        h1, h2, h3 { font-family: var(--font-display); color: var(--maroon-800); letter-spacing: -0.01em; }

        .mono { font-family: var(--font-mono); }

        /* ============ NAVBAR ============ */
        .navbar {
            background: linear-gradient(135deg, var(--maroon-800), var(--maroon-700));
            color: var(--paper);
            padding: 0.9rem 1.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-md);
            border-bottom: 3px solid var(--gold-500);
        }

        .navbar-brand { display: flex; align-items: center; gap: 0.75rem; }

        /* Lencana logo: teks "TS" selalu ada di belakang, logo.png menutupinya kalau berhasil dimuat.
           Kalau file logo.png belum di-upload / gagal load, fallback teks otomatis kelihatan -- gak ada gambar patah. */
        .logo-badge {
            position: relative;
            border-radius: 50%;
            overflow: hidden;
            background: var(--maroon-700);
            border: 2px solid var(--gold-500);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-display); font-weight: 700; color: var(--gold-100);
            flex-shrink: 0;
        }
        .logo-badge img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
        .logo-badge.size-sm { width: 42px; height: 42px; font-size: 1rem; }
        .logo-badge.size-lg { width: 76px; height: 76px; font-size: 1.8rem; border-width: 3px; margin: 0 auto 1rem; }

        .navbar-titles h1 { color: var(--paper); font-size: 1.15rem; font-weight: 700; line-height: 1.2; }
        .navbar-titles p { font-size: 0.72rem; color: var(--gold-300); letter-spacing: 0.05em; text-transform: uppercase; }

        .navbar-right { display: flex; align-items: center; gap: 1rem; }
        .navbar-user { font-size: 0.85rem; color: var(--gold-100); }

        .btn-logout {
            background: rgba(255,255,255,0.12);
            color: var(--paper);
            border: 1px solid rgba(255,255,255,0.25);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn-logout:hover { background: rgba(255,255,255,0.22); }

        /* ============ LOGIN ============ */
        .login-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background: var(--paper);
            padding: 2.25rem 2rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            border-top: 4px solid var(--gold-500);
            text-align: center;
        }

        .login-card h2 { font-size: 1.3rem; margin-bottom: 0.15rem; }
        .login-card .school-name { font-size: 0.95rem; font-weight: 700; color: var(--maroon-700); margin-bottom: 0.15rem; }
        .login-card .subtitle { font-size: 0.8rem; color: var(--ink-400); margin-bottom: 1.5rem; }

        .form-group { margin-bottom: 1rem; text-align: left; }

        .form-group label {
            display: block; margin-bottom: 0.4rem;
            font-weight: 600; font-size: 0.85rem; color: var(--ink-600);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.7rem 0.85rem;
            border: 1.5px solid var(--line);
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-family: var(--font-body);
            background: var(--paper);
            color: var(--ink-900);
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--gold-500);
            box-shadow: 0 0 0 3px rgba(200, 155, 60, 0.18);
        }

        .btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--maroon-700);
            color: var(--paper);
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-family: var(--font-body);
            cursor: pointer;
            font-weight: 700;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:hover { background: var(--maroon-600); }
        .btn:active { transform: scale(0.99); }
        .btn:disabled { background: var(--ink-400); cursor: not-allowed; }

        .btn-gold { background: var(--gold-500); color: var(--maroon-900); }
        .btn-gold:hover { background: var(--gold-600); }

        .btn-secondary { background: var(--paper); color: var(--maroon-700); border: 1.5px solid var(--maroon-700); }
        .btn-secondary:hover { background: var(--parchment-50); }

        .btn-outline-w { width: auto; }

        .login-demo-hint { margin-top: 1.1rem; font-size: 0.78rem; color: var(--ink-400); }

        /* ============ LAYOUT UMUM ============ */
        .container { max-width: 1180px; margin: 0 auto; padding: 1.75rem 1.25rem 3rem; }

        .tabs {
            display: flex; gap: 0.4rem; margin-bottom: 1.75rem;
            border-bottom: 2px solid var(--line);
            overflow-x: auto;
        }

        .tab-btn {
            padding: 0.85rem 1.15rem;
            background: none; border: none;
            color: var(--ink-400); cursor: pointer;
            font-size: 0.92rem; font-weight: 700;
            font-family: var(--font-body);
            border-bottom: 3px solid transparent;
            white-space: nowrap;
            transition: color 0.2s;
        }
        .tab-btn.active { color: var(--maroon-700); border-bottom-color: var(--gold-500); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card {
            background: var(--paper);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--line);
        }

        .card-pad { padding: 1.5rem; }

        .card h3 { font-size: 1.1rem; margin-bottom: 1rem; }

        /* ============ FORM TAMBAH ANGGOTA ============ */
        .type-selector { display: flex; gap: 0.5rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
        .type-chip {
            padding: 0.55rem 1.1rem;
            border-radius: 999px;
            border: 1.5px solid var(--line);
            background: var(--paper);
            color: var(--ink-600);
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .type-chip.active { background: var(--maroon-700); color: var(--paper); border-color: var(--maroon-700); }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
        .form-row.full { grid-template-columns: 1fr; }

        .file-input-wrapper { position: relative; overflow: hidden; display: inline-block; width: 100%; }
        .file-input-wrapper input[type=file] { position: absolute; left: -9999px; }
        .file-input-label {
            display: block; padding: 0.7rem; background: var(--parchment-50);
            border: 1.5px dashed var(--gold-500);
            color: var(--maroon-700); border-radius: var(--radius-sm);
            cursor: pointer; text-align: center; font-weight: 700; font-size: 0.88rem;
            transition: background 0.2s;
        }
        .file-input-label:hover { background: var(--gold-100); }
        .file-name { margin-top: 0.4rem; font-size: 0.82rem; color: var(--ink-400); }
        .photo-preview { margin-top: 0.75rem; max-width: 130px; border-radius: var(--radius-sm); border: 2px solid var(--line); }

        /* ============ TABEL ============ */
        .table-toolbar {
            display: flex; gap: 0.6rem; padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--line);
            flex-wrap: wrap; align-items: center;
        }
        .search-input {
            flex: 1; min-width: 180px;
            padding: 0.6rem 0.9rem;
            border: 1.5px solid var(--line);
            border-radius: var(--radius-sm);
            font-family: var(--font-body);
            font-size: 0.9rem;
        }
        .search-input:focus { outline: none; border-color: var(--gold-500); }

        .filter-chip-row { display: flex; gap: 0.4rem; }
        .filter-chip {
            padding: 0.5rem 0.9rem; border-radius: 999px;
            border: 1.5px solid var(--line); background: var(--paper);
            color: var(--ink-600); font-size: 0.8rem; font-weight: 700; cursor: pointer;
            white-space: nowrap;
        }
        .filter-chip.active { background: var(--gold-500); color: var(--maroon-900); border-color: var(--gold-500); }

        table { width: 100%; border-collapse: collapse; }
        th {
            background: var(--parchment-50);
            padding: 0.85rem 1rem; text-align: left;
            font-weight: 700; font-size: 0.78rem;
            text-transform: uppercase; letter-spacing: 0.04em;
            color: var(--maroon-700);
            border-bottom: 2px solid var(--line);
        }
        td { padding: 0.85rem 1rem; border-bottom: 1px solid var(--line); vertical-align: middle; font-size: 0.9rem; }
        tr:hover td { background: var(--parchment-50); }

        .table-avatar { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; display: block; border: 1.5px solid var(--line); }
        .table-avatar-fallback {
            width: 38px; height: 38px; border-radius: 50%;
            background: var(--maroon-700); color: var(--gold-100);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-display); font-weight: 700; font-size: 0.9rem;
        }

        .tipe-badge { padding: 0.25rem 0.6rem; border-radius: 999px; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; }
        .tipe-siswa { background: var(--info-100); color: var(--info-600); }
        .tipe-guru { background: var(--gold-100); color: var(--gold-600); }
        .tipe-karyawan { background: var(--parchment-50); color: var(--ink-600); border: 1px solid var(--line); }

        .btn-delete {
            background: var(--danger-100); color: var(--danger-600);
            border: none; padding: 0.4rem 0.75rem; border-radius: var(--radius-sm);
            font-size: 0.78rem; font-weight: 700; cursor: pointer; width: auto;
        }
        .btn-delete:hover { background: var(--danger-600); color: var(--paper); }

        .pagination {
            display: flex; align-items: center; justify-content: space-between;
            padding: 1rem 1.25rem; font-size: 0.85rem; color: var(--ink-600); flex-wrap: wrap; gap: 0.6rem;
        }
        .pagination-btns { display: flex; gap: 0.4rem; }
        .pagination-btns button {
            padding: 0.4rem 0.8rem; border-radius: var(--radius-sm);
            border: 1.5px solid var(--line); background: var(--paper);
            cursor: pointer; font-weight: 700; font-size: 0.82rem;
        }
        .pagination-btns button:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ============ ABSENSI / SCANNER ============ */
        .scanner-layout { display: grid; grid-template-columns: 1.15fr 1fr; gap: 1.5rem; align-items: start; }
        @media (max-width: 860px) { .scanner-layout { grid-template-columns: 1fr; } }

        .scanner-viewport {
            position: relative;
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: var(--ink-900);
            aspect-ratio: 4 / 3;
        }

        #camera { width: 100%; height: 100%; object-fit: cover; display: block; }
        #overlay { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }

        .scanner-bracket {
            position: absolute; width: 34px; height: 34px;
            border-color: var(--gold-500); pointer-events: none;
        }
        .scanner-bracket.tl { top: 14px; left: 14px; border-top: 4px solid var(--gold-500); border-left: 4px solid var(--gold-500); border-radius: 6px 0 0 0; }
        .scanner-bracket.tr { top: 14px; right: 14px; border-top: 4px solid var(--gold-500); border-right: 4px solid var(--gold-500); border-radius: 0 6px 0 0; }
        .scanner-bracket.bl { bottom: 14px; left: 14px; border-bottom: 4px solid var(--gold-500); border-left: 4px solid var(--gold-500); border-radius: 0 0 0 6px; }
        .scanner-bracket.br { bottom: 14px; right: 14px; border-bottom: 4px solid var(--gold-500); border-right: 4px solid var(--gold-500); border-radius: 0 0 6px 0; }

        .scan-line {
            position: absolute; left: 14px; right: 14px; height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold-300), transparent);
            animation: scan-sweep 2.8s ease-in-out infinite;
            opacity: 0.85;
        }
        @keyframes scan-sweep {
            0%, 100% { top: 12%; }
            50% { top: 88%; }
        }
        @media (prefers-reduced-motion: reduce) { .scan-line { animation: none; display: none; } }

        .scanner-placeholder {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 0.75rem;
            color: var(--gold-100);
        }
        .scanner-placeholder .btn { width: auto; padding: 0.75rem 1.5rem; }

        .camera-controls { display: flex; gap: 0.6rem; justify-content: center; margin-top: 1rem; }
        .camera-controls .btn { width: auto; padding: 0.7rem 1.4rem; }

        .offline-badge {
            display: none;
            margin-top: 0.75rem;
            padding: 0.6rem 0.9rem;
            background: var(--gold-100); color: var(--gold-600);
            border-radius: var(--radius-sm);
            font-size: 0.82rem; font-weight: 700; text-align: center;
        }

        /* ---- Kartu identitas (ID reveal) ---- */
        .id-card {
            background: var(--paper);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            min-height: 340px;
            display: flex; flex-direction: column;
        }
        .id-card-header {
            background: linear-gradient(135deg, var(--maroon-800), var(--maroon-700));
            padding: 0.9rem 1.25rem;
            color: var(--gold-100);
            font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
            border-bottom: 3px solid var(--gold-500);
        }
        .id-card-body { padding: 1.5rem; flex: 1; display: flex; flex-direction: column; align-items: center; text-align: center; justify-content: center; gap: 0.9rem; }
        .id-card-empty { color: var(--ink-400); font-size: 0.88rem; }
        .id-photo {
            width: 96px; height: 96px; border-radius: 50%;
            object-fit: cover; border: 3px solid var(--gold-500);
            background: var(--parchment-50);
        }
        .id-photo-fallback {
            width: 96px; height: 96px; border-radius: 50%;
            background: var(--maroon-700); color: var(--gold-100);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-display); font-size: 2rem; font-weight: 700;
            border: 3px solid var(--gold-500);
        }
        .id-card-name { font-size: 1.25rem; font-weight: 700; color: var(--maroon-800); }
        .id-card-meta { display: flex; flex-direction: column; gap: 0.35rem; width: 100%; }
        .id-card-meta-row {
            display: flex; justify-content: space-between; gap: 1rem;
            padding: 0.5rem 0.85rem; background: var(--parchment-50); border-radius: var(--radius-sm);
            font-size: 0.85rem;
        }
        .id-card-meta-row .label { color: var(--ink-400); font-weight: 600; }
        .id-card-meta-row .value { font-family: var(--font-mono); font-weight: 600; color: var(--ink-900); }
        .id-card-status {
            padding: 0.4rem 1rem; border-radius: 999px; font-weight: 700; font-size: 0.82rem;
        }
        .id-card-status.ok { background: var(--success-100); color: var(--success-600); }
        .id-card-status.dup { background: var(--info-100); color: var(--info-600); }

        .attendance-log { margin-top: 1rem; max-height: 260px; overflow-y: auto; }
        .log-entry {
            display: flex; justify-content: space-between; gap: 0.75rem;
            padding: 0.6rem 0.85rem; border-radius: var(--radius-sm);
            font-size: 0.82rem; margin-bottom: 0.5rem;
        }
        .log-entry.ok { background: var(--success-100); color: var(--success-600); }
        .log-entry.dup { background: var(--info-100); color: var(--info-600); }
        .log-entry.err { background: var(--danger-100); color: var(--danger-600); }
        .log-time { font-family: var(--font-mono); opacity: 0.75; flex-shrink: 0; }

        /* ============ REPORT ============ */
        .summary-strip { display: flex; gap: 1rem; padding: 1.25rem; flex-wrap: wrap; }
        .summary-box {
            flex: 1; min-width: 140px;
            background: var(--parchment-50); border-radius: var(--radius-md);
            padding: 1rem 1.25rem; border-left: 4px solid var(--gold-500);
        }
        .summary-box .num { font-family: var(--font-display); font-size: 1.8rem; font-weight: 700; color: var(--maroon-700); }
        .summary-box .lbl { font-size: 0.78rem; color: var(--ink-400); font-weight: 600; }

        .badge { display: inline-block; padding: 0.3rem 0.75rem; border-radius: 999px; font-size: 0.78rem; font-weight: 700; }
        .badge-present { background: var(--success-100); color: var(--success-600); }
        .badge-absent { background: var(--danger-100); color: var(--danger-600); }

        /* ============ MESSAGE / ALERT ============ */
        .message { padding: 0.85rem 1rem; border-radius: var(--radius-sm); margin-bottom: 1rem; font-size: 0.88rem; font-weight: 600; }
        .message.error { background: var(--danger-100); color: var(--danger-600); }
        .message.success { background: var(--success-100); color: var(--success-600); }
        .message.info { background: var(--info-100); color: var(--info-600); }

        .spinner {
            border: 4px solid var(--parchment-50);
            border-top: 4px solid var(--gold-500);
            border-radius: 50%; width: 38px; height: 38px;
            animation: spin 0.9s linear infinite; margin: 1rem auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .boot-screen {
            max-width: 380px; margin: 6rem auto; background: var(--paper);
            padding: 2.5rem 2rem; border-radius: var(--radius-lg); box-shadow: var(--shadow-md);
            text-align: center; border-top: 4px solid var(--gold-500);
        }
        .boot-screen.error { color: var(--danger-600); }
        .boot-screen p { font-size: 0.88rem; color: var(--ink-600); }

        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; }
            .navbar { padding: 0.8rem 1rem; }
            .navbar-titles p { display: none; }
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="boot-screen">
            <div class="spinner"></div>
            <p>Memuat model face recognition...</p>
        </div>
    </div>

    <!-- Face recognition jalan di browser (tidak butuh service Python terpisah) -->
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>

    <script>
        const CONFIG = {
            MODEL_URL: 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model',
            MATCH_THRESHOLD: 0.5,     // makin kecil = makin ketat pencocokan wajah
            COOLDOWN_MS: 5000,        // jangan catat absen orang yang sama < 5 detik
            CONFIRM_FRAMES: 2,        // perlu N frame berturut-turut cocok sebelum absen resmi dicatat
            LOOP_DELAY_MS: 550,       // jeda antar siklus deteksi real-time
            DETECT_INPUT_SIZE: 256,   // ukuran input detektor real-time (kecil = cepat)
            ENROLL_INPUT_SIZE: 512,   // ukuran input detektor saat enroll foto (besar = akurat, cuma sekali jalan)
        };

        const KELAS_OPTIONS = ['X TKJ', 'X TKR', 'XI TKJ', 'XI TKR', 'XII TKJ', 'XII TKR'];

        const app = {
            session: null,
            geofenceEnabled: false,
            currentTab: 'anggota',

            anggotaSearch: '',
            anggotaTipeFilter: '',
            anggotaPage: 1,
            formTipe: 'siswa',

            reportSearch: '',
            reportTipeFilter: '',
            reportPage: 1,
            reportMode: 'harian',

            faceMatcher: null,
            peopleMap: {},
            lastRecognized: {},
            pendingConfirm: {},
            stopCapture: true,

            // ============ INIT ============
            async init() {
                try {
                    if (faceapi.tf && faceapi.tf.setBackend) {
                        try {
                            await faceapi.tf.setBackend('webgl');
                        } catch (e) {
                            console.warn('WebGL tidak tersedia, pakai backend default:', e.message);
                        }
                        await faceapi.tf.ready();
                    }

                    await Promise.all([
                        faceapi.nets.tinyFaceDetector.loadFromUri(CONFIG.MODEL_URL),
                        faceapi.nets.faceLandmark68Net.loadFromUri(CONFIG.MODEL_URL),
                        faceapi.nets.faceRecognitionNet.loadFromUri(CONFIG.MODEL_URL),
                    ]);

                    await this.warmUp();
                } catch (e) {
                    document.getElementById('root').innerHTML = `
                        <div class="boot-screen error">
                            <p><strong>❌ Gagal memuat model face recognition.</strong></p>
                            <p style="margin-top:0.5rem;">Cek koneksi internet perangkat ini (model diambil dari CDN), lalu refresh halaman.</p>
                            <p style="margin-top:0.5rem; font-size:0.75rem; color:var(--ink-400);">${this.escapeHtml(e.message)}</p>
                        </div>`;
                    return;
                }

                try {
                    const configRes = await fetch('/api/config');
                    const cfg = await configRes.json();
                    this.geofenceEnabled = !!cfg.geofenceEnabled;
                } catch (e) {
                    this.geofenceEnabled = false;
                }

                setInterval(() => { if (navigator.onLine) this.flushOfflineQueue(); }, 20000);

                this.checkAuth();
            },

            async warmUp() {
                try {
                    const canvas = document.createElement('canvas');
                    canvas.width = 320;
                    canvas.height = 240;
                    await faceapi.detectAllFaces(canvas, new faceapi.TinyFaceDetectorOptions({ inputSize: 224 }));
                } catch (e) {
                    // Gagal warm-up gak fatal -- cuma berarti scan pertama nanti sedikit lebih lambat
                }
            },

            getPosition() {
                return new Promise((resolve, reject) => {
                    if (!navigator.geolocation) {
                        reject(new Error('Perangkat tidak mendukung deteksi lokasi'));
                        return;
                    }
                    navigator.geolocation.getCurrentPosition(
                        resolve,
                        (err) => reject(new Error(err.message || 'Gagal mendapatkan lokasi')),
                        { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
                    );
                });
            },

            escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str ?? '';
                return div.innerHTML;
            },

            initials(nama) {
                if (!nama) return '?';
                const parts = String(nama).trim().split(/\s+/);
                return ((parts[0] && parts[0][0] || '') + (parts[1] && parts[1][0] || '')).toUpperCase() || '?';
            },

            renderLogo(sizeClass) {
                return `<div class="logo-badge ${sizeClass}"><span>TS</span><img src="/logo.png" alt="Logo" onerror="this.style.display='none'"></div>`;
            },

            renderPagination(containerId, result, onPage) {
                const el = document.getElementById(containerId);
                if (!el) return;
                const { page, totalPages, total } = result;
                el.innerHTML = `
                    <span>Halaman ${page} dari ${totalPages} &middot; ${total} data</span>
                    <div class="pagination-btns">
                        <button ${page <= 1 ? 'disabled' : ''} id="${containerId}Prev">‹ Sebelumnya</button>
                        <button ${page >= totalPages ? 'disabled' : ''} id="${containerId}Next">Berikutnya ›</button>
                    </div>
                `;
                const prevBtn = document.getElementById(containerId + 'Prev');
                const nextBtn = document.getElementById(containerId + 'Next');
                if (prevBtn) prevBtn.onclick = () => onPage(page - 1);
                if (nextBtn) nextBtn.onclick = () => onPage(page + 1);
            },

            // Wrapper fetch yang otomatis nyisipin token sesi & nanganin sesi kedaluwarsa
            async apiFetch(path, options = {}) {
                const headers = Object.assign({ 'Content-Type': 'application/json' }, options.headers || {});
                if (this.session && this.session.token) {
                    headers['Authorization'] = 'Bearer ' + this.session.token;
                }
                const response = await fetch('/api' + path, Object.assign({}, options, { headers }));
                if (response.status === 401) {
                    this.session = null;
                    localStorage.removeItem('session');
                    this.showLogin('Sesi berakhir, silakan login ulang.');
                    throw new Error('UNAUTHORIZED');
                }
                return response;
            },

            // ============ AUTH ============
            checkAuth() {
                const raw = localStorage.getItem('session');
                if (raw) {
                    try {
                        this.session = JSON.parse(raw);
                        this.showDashboard();
                        return;
                    } catch (e) { /* lanjut ke login */ }
                }
                this.showLogin();
            },

            showLogin(noticeMessage) {
                document.getElementById('root').innerHTML = `
                    <div class="login-wrap">
                        <div class="login-card">
                            ${this.renderLogo('size-lg')}
                            <div class="school-name">SMK TAMANSISWA MOJOAGUNG</div>
                            <h2>Sistem Absensi</h2>
                            <p class="subtitle">Face Recognition Attendance</p>
                            <div id="loginMessage">${noticeMessage ? `<div class="message info">${this.escapeHtml(noticeMessage)}</div>` : ''}</div>
                            <form onsubmit="app.handleLogin(event)">
                                <div class="form-group">
                                    <label>Username</label>
                                    <input type="text" id="username" required autocomplete="username">
                                </div>
                                <div class="form-group">
                                    <label>Password</label>
                                    <input type="password" id="password" required autocomplete="current-password">
                                </div>
                                <button type="submit" class="btn" id="loginBtn">Login</button>
                            </form>
                            <p class="login-demo-hint">Demo: admin / admin123${this.geofenceEnabled ? ' &middot; Login perlu izin lokasi aktif' : ''}</p>
                        </div>
                    </div>
                `;
            },

            async handleLogin(e) {
                e.preventDefault();
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                const msgBox = document.getElementById('loginMessage');
                const submitBtn = document.getElementById('loginBtn');

                submitBtn.disabled = true;

                let lat = null, lng = null;
                if (this.geofenceEnabled) {
                    msgBox.innerHTML = `<div class="message info">📍 Mengecek lokasi perangkat...</div>`;
                    try {
                        const pos = await this.getPosition();
                        lat = pos.coords.latitude;
                        lng = pos.coords.longitude;
                    } catch (geoError) {
                        msgBox.innerHTML = `<div class="message error">📍 ${this.escapeHtml(geoError.message)}. Login memerlukan izin lokasi aktif.</div>`;
                        submitBtn.disabled = false;
                        return;
                    }
                }

                msgBox.innerHTML = `<div class="message info">⏳ Memproses login...</div>`;

                try {
                    const response = await fetch('/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password, lat, lng })
                    });
                    const data = await response.json();

                    if (data.success) {
                        this.session = { token: data.token, username: data.username };
                        localStorage.setItem('session', JSON.stringify(this.session));
                        this.showDashboard();
                    } else {
                        msgBox.innerHTML = `<div class="message error">${this.escapeHtml(data.message)}</div>`;
                    }
                } catch (error) {
                    msgBox.innerHTML = `<div class="message error">Error: ${this.escapeHtml(error.message)}</div>`;
                } finally {
                    submitBtn.disabled = false;
                }
            },

            async logout() {
                this.stopCamera();
                try { await this.apiFetch('/logout', { method: 'POST' }); } catch (e) { /* gapapa kalau gagal, tetep logout di sisi client */ }
                localStorage.removeItem('session');
                this.session = null;
                this.showLogin();
            },

            // ============ DASHBOARD SHELL ============
            showDashboard() {
                document.getElementById('root').innerHTML = `
                    <nav class="navbar">
                        <div class="navbar-brand">
                            ${this.renderLogo('size-sm')}
                            <div class="navbar-titles">
                                <h1>SMK Tamansiswa Mojoagung</h1>
                                <p>Sistem Absensi Face Recognition</p>
                            </div>
                        </div>
                        <div class="navbar-right">
                            <span class="navbar-user">👤 ${this.escapeHtml(this.session.username)}</span>
                            <button class="btn-logout" onclick="app.logout()">Logout</button>
                        </div>
                    </nav>

                    <div class="container">
                        <div class="tabs">
                            <button class="tab-btn active" onclick="app.switchTab('anggota', event)">👥 Manage Anggota</button>
                            <button class="tab-btn" onclick="app.switchTab('absen', event)">📸 Absensi</button>
                            <button class="tab-btn" onclick="app.switchTab('report', event)">📊 Report</button>
                        </div>

                        <div id="anggota" class="tab-content active">${this.renderAnggotaTab()}</div>
                        <div id="absen" class="tab-content">${this.renderAbsenTab()}</div>
                        <div id="report" class="tab-content">${this.renderReportTab()}</div>
                    </div>
                `;

                this.setFormTipe(this.formTipe);
                this.loadAnggotaList();
                this.loadReport();
                this.updateOfflineBadge();
            },

            switchTab(tab, evt) {
                document.querySelectorAll('.tab-content').forEach((el) => el.classList.remove('active'));
                document.querySelectorAll('.tab-btn').forEach((el) => el.classList.remove('active'));
                document.getElementById(tab).classList.add('active');
                if (evt && evt.target) evt.target.classList.add('active');

                if (this.currentTab === 'absen' && tab !== 'absen') this.stopCamera();
                this.currentTab = tab;

                if (tab === 'absen') setTimeout(() => this.startCamera(), 250);
                else if (tab === 'report') this.loadReport();
                else if (tab === 'anggota') this.loadAnggotaList();
            },

            // ============ TAB: MANAGE ANGGOTA ============
            renderAnggotaTab() {
                return `
                    <div class="card card-pad" style="margin-bottom:1.5rem;">
                        <h3>Tambah Anggota Baru</h3>
                        <div id="formMessage"></div>
                        <div class="type-selector" id="typeSelectorAdd">
                            <button type="button" class="type-chip active" data-tipe="siswa" onclick="app.setFormTipe('siswa')">🎓 Siswa</button>
                            <button type="button" class="type-chip" data-tipe="guru" onclick="app.setFormTipe('guru')">👨‍🏫 Guru</button>
                            <button type="button" class="type-chip" data-tipe="karyawan" onclick="app.setFormTipe('karyawan')">🧑‍💼 Karyawan</button>
                        </div>
                        <form onsubmit="app.handleAddAnggota(event)">
                            <div class="form-row full">
                                <div class="form-group"><label>Nama Lengkap</label><input type="text" id="nama" required></div>
                            </div>
                            <div id="dynamicFormFields"></div>
                            <div class="form-row full">
                                <div class="form-group">
                                    <label>Foto Wajah</label>
                                    <div class="file-input-wrapper">
                                        <label class="file-input-label">📷 Pilih Foto
                                            <input type="file" id="photo" accept="image/*" required onchange="app.showPhotoPreview(event)">
                                        </label>
                                    </div>
                                    <div id="photoPreview"></div>
                                    <p class="file-name" id="fileName"></p>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-gold" id="submitAnggotaBtn">Simpan</button>
                        </form>
                    </div>

                    <div class="card">
                        <div class="table-toolbar">
                            <input type="text" class="search-input" placeholder="Cari nama / NIS / NISN / ID Pegawai..." oninput="app.setAnggotaSearch(this.value)">
                            <div class="filter-chip-row" id="anggotaFilterChips">
                                <button class="filter-chip active" data-tipe="" onclick="app.setAnggotaFilter('')">Semua</button>
                                <button class="filter-chip" data-tipe="siswa" onclick="app.setAnggotaFilter('siswa')">Siswa</button>
                                <button class="filter-chip" data-tipe="guru" onclick="app.setAnggotaFilter('guru')">Guru</button>
                                <button class="filter-chip" data-tipe="karyawan" onclick="app.setAnggotaFilter('karyawan')">Karyawan</button>
                            </div>
                        </div>
                        <div style="overflow-x:auto;">
                            <table>
                                <thead>
                                    <tr><th>Foto</th><th>Tipe</th><th>Nama</th><th>NISN / ID Pegawai</th><th>Kelas / Jabatan</th><th>Aksi</th></tr>
                                </thead>
                                <tbody id="anggotaTable"></tbody>
                            </table>
                        </div>
                        <div class="pagination" id="anggotaPagination"></div>
                    </div>
                `;
            },

            renderDynamicFormFields() {
                if (this.formTipe === 'siswa') {
                    return `
                        <div class="form-row">
                            <div class="form-group"><label>NIS</label><input type="text" id="nis" required></div>
                            <div class="form-group"><label>NISN</label><input type="text" id="nisn" required></div>
                        </div>
                        <div class="form-row full">
                            <div class="form-group">
                                <label>Kelas</label>
                                <select id="kelasJabatan" required>
                                    <option value="">-- Pilih Kelas --</option>
                                    ${KELAS_OPTIONS.map((k) => `<option value="${k}">${k}</option>`).join('')}
                                </select>
                            </div>
                        </div>
                    `;
                }
                return `
                    <div class="form-row">
                        <div class="form-group"><label>ID Pegawai</label><input type="text" id="idPegawai" required></div>
                        <div class="form-group"><label>${this.formTipe === 'guru' ? 'Mata Pelajaran' : 'Jabatan'}</label><input type="text" id="kelasJabatan" required></div>
                    </div>
                `;
            },

            setFormTipe(tipe) {
                this.formTipe = tipe;
                document.querySelectorAll('#typeSelectorAdd .type-chip').forEach((el) => {
                    el.classList.toggle('active', el.dataset.tipe === tipe);
                });
                const container = document.getElementById('dynamicFormFields');
                if (container) container.innerHTML = this.renderDynamicFormFields();
            },

            showPhotoPreview(event) {
                const file = event.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        document.getElementById('photoPreview').innerHTML = `<img src="${e.target.result}" class="photo-preview">`;
                    };
                    reader.readAsDataURL(file);
                    document.getElementById('fileName').textContent = file.name;
                }
            },

            makeThumbnail(img, size) {
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');
                const scale = Math.max(size / img.width, size / img.height);
                const w = img.width * scale, h = img.height * scale;
                ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
                return canvas.toDataURL('image/jpeg', 0.7);
            },

            async handleAddAnggota(e) {
                e.preventDefault();
                const nama = document.getElementById('nama').value.trim();
                const file = document.getElementById('photo').files[0];
                const msgBox = document.getElementById('formMessage');
                const submitBtn = document.getElementById('submitAnggotaBtn');

                const payload = { tipe: this.formTipe, nama };
                if (this.formTipe === 'siswa') {
                    payload.nis = document.getElementById('nis').value.trim();
                    payload.nisn = document.getElementById('nisn').value.trim();
                    payload.kelas_jabatan = document.getElementById('kelasJabatan').value;
                } else {
                    payload.id_pegawai = document.getElementById('idPegawai').value.trim();
                    payload.kelas_jabatan = document.getElementById('kelasJabatan').value.trim();
                }

                if (!file) {
                    msgBox.innerHTML = `<div class="message error">❌ Pilih foto wajah dulu</div>`;
                    return;
                }

                submitBtn.disabled = true;
                msgBox.innerHTML = `<div class="message info">⏳ Mendeteksi wajah dari foto...</div>`;

                try {
                    const img = await faceapi.bufferToImage(file);
                    const detection = await faceapi
                        .detectSingleFace(img, new faceapi.TinyFaceDetectorOptions({ inputSize: CONFIG.ENROLL_INPUT_SIZE }))
                        .withFaceLandmarks()
                        .withFaceDescriptor();

                    if (!detection) {
                        msgBox.innerHTML = `<div class="message error">❌ Wajah tidak terdeteksi di foto. Coba foto lain: pencahayaan lebih terang, wajah menghadap kamera.</div>`;
                        submitBtn.disabled = false;
                        return;
                    }

                    payload.encoding = Array.from(detection.descriptor);
                    payload.foto = this.makeThumbnail(img, 140);

                    const response = await this.apiFetch('/anggota', { method: 'POST', body: JSON.stringify(payload) });
                    const data = await response.json();

                    if (data.success) {
                        msgBox.innerHTML = `<div class="message success">✅ ${this.escapeHtml(data.message)}</div>`;
                        e.target.reset();
                        document.getElementById('photoPreview').innerHTML = '';
                        document.getElementById('fileName').textContent = '';
                        this.anggotaPage = 1;
                        this.loadAnggotaList();
                    } else {
                        msgBox.innerHTML = `<div class="message error">❌ ${this.escapeHtml(data.error)}</div>`;
                    }
                } catch (error) {
                    if (error.message !== 'UNAUTHORIZED') {
                        msgBox.innerHTML = `<div class="message error">Error: ${this.escapeHtml(error.message)}</div>`;
                    }
                } finally {
                    submitBtn.disabled = false;
                }
            },

            async loadAnggotaList() {
                const tbody = document.getElementById('anggotaTable');
                if (!tbody) return;
                try {
                    const params = new URLSearchParams({
                        search: this.anggotaSearch, tipe: this.anggotaTipeFilter,
                        page: this.anggotaPage, limit: 20,
                    });
                    const response = await this.apiFetch('/anggota?' + params.toString());
                    const result = await response.json();

                    tbody.innerHTML = result.data.map((p) => `
                        <tr>
                            <td>${p.foto ? `<img src="${p.foto}" class="table-avatar" alt="">` : `<div class="table-avatar-fallback">${this.initials(p.nama)}</div>`}</td>
                            <td><span class="tipe-badge tipe-${p.tipe}">${p.tipe}</span></td>
                            <td>${this.escapeHtml(p.nama)}</td>
                            <td class="mono">${this.escapeHtml((p.tipe === 'siswa' ? p.nisn : p.id_pegawai) || '-')}</td>
                            <td>${this.escapeHtml(p.kelas_jabatan || '-')}</td>
                            <td><button class="btn-delete" onclick="app.deleteAnggota(${p.id})">🗑️ Hapus</button></td>
                        </tr>
                    `).join('') || `<tr><td colspan="6" style="text-align:center; color:var(--ink-400); padding:2rem;">Tidak ada data</td></tr>`;

                    this.renderPagination('anggotaPagination', result, (page) => { this.anggotaPage = page; this.loadAnggotaList(); });
                } catch (error) {
                    if (error.message !== 'UNAUTHORIZED') console.error('Error loading anggota:', error);
                }
            },

            setAnggotaSearch(val) {
                this.anggotaSearch = val;
                this.anggotaPage = 1;
                clearTimeout(this._anggotaSearchTimer);
                this._anggotaSearchTimer = setTimeout(() => this.loadAnggotaList(), 350);
            },

            setAnggotaFilter(tipe) {
                this.anggotaTipeFilter = tipe;
                this.anggotaPage = 1;
                document.querySelectorAll('#anggotaFilterChips .filter-chip').forEach((el) => {
                    el.classList.toggle('active', el.dataset.tipe === tipe);
                });
                this.loadAnggotaList();
            },

            async deleteAnggota(id) {
                if (!confirm('Hapus data ini? Riwayat absensinya juga akan terhapus.')) return;
                try {
                    const response = await this.apiFetch('/anggota/' + id, { method: 'DELETE' });
                    const data = await response.json();
                    if (data.success) { this.loadAnggotaList(); this.loadReport(); }
                } catch (error) {
                    if (error.message !== 'UNAUTHORIZED') alert('Error: ' + error.message);
                }
            },

            // ============ TAB: ABSENSI ============
            renderAbsenTab() {
                return `
                    <div class="scanner-layout">
                        <div class="card card-pad">
                            <h3>📸 Pindai Wajah</h3>
                            <p style="font-size:0.85rem; color:var(--ink-400); margin-bottom:0.75rem;">Beberapa orang bisa antre & terdeteksi sekaligus di depan kamera</p>
                            <div class="scanner-viewport">
                                <video id="camera" autoplay playsinline muted></video>
                                <canvas id="overlay"></canvas>
                                <div class="scanner-bracket tl"></div>
                                <div class="scanner-bracket tr"></div>
                                <div class="scanner-bracket bl"></div>
                                <div class="scanner-bracket br"></div>
                                <div class="scan-line" id="scanLine" style="display:none;"></div>
                                <div class="scanner-placeholder" id="scannerPlaceholder">
                                    <span style="font-size:2.2rem;">📷</span>
                                    <button class="btn btn-gold btn-outline-w" onclick="app.startCamera()" id="startBtn">Mulai Kamera</button>
                                </div>
                            </div>
                            <div class="camera-controls">
                                <button class="btn btn-secondary btn-outline-w" onclick="app.stopCamera()" id="stopBtn" style="display:none;">⏹️ Stop Kamera</button>
                            </div>
                            <div class="offline-badge" id="offlineBadge"></div>
                        </div>
                        <div>
                            <div class="id-card">
                                <div class="id-card-header">Hasil Pemindaian</div>
                                <div class="id-card-body" id="idCardBody">
                                    <div class="id-card-empty">Belum ada yang terdeteksi</div>
                                </div>
                            </div>
                            <div class="attendance-log" id="attendanceStatus"></div>
                        </div>
                    </div>
                `;
            },

            async loadFaceMatcher() {
                const response = await this.apiFetch('/anggota/encodings');
                const data = await response.json();

                this.peopleMap = {};
                const labeled = [];
                data.forEach((p) => {
                    this.peopleMap[p.id] = p;
                    labeled.push(new faceapi.LabeledFaceDescriptors(String(p.id), [new Float32Array(p.encoding)]));
                });

                if (labeled.length === 0) { this.faceMatcher = null; return false; }
                this.faceMatcher = new faceapi.FaceMatcher(labeled, CONFIG.MATCH_THRESHOLD);
                return true;
            },

            async startCamera() {
                if (!this.stopCapture) return;
                const statusDiv = document.getElementById('attendanceStatus');
                if (!statusDiv) return;

                statusDiv.innerHTML = '';
                let ok;
                try {
                    ok = await this.loadFaceMatcher();
                } catch (error) {
                    if (error.message !== 'UNAUTHORIZED') {
                        statusDiv.innerHTML = `<div class="log-entry err"><span>Gagal memuat data wajah: ${this.escapeHtml(error.message)}</span></div>`;
                    }
                    return;
                }

                if (!ok) {
                    statusDiv.innerHTML = `<div class="log-entry err"><span>⚠️ Belum ada anggota dengan data wajah terdaftar. Tambahkan dulu di tab "Manage Anggota".</span></div>`;
                    return;
                }

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
                    });
                    const video = document.getElementById('camera');
                    video.srcObject = stream;
                    await new Promise((resolve) => { video.onloadedmetadata = resolve; });

                    document.getElementById('scannerPlaceholder').style.display = 'none';
                    document.getElementById('scanLine').style.display = 'block';
                    document.getElementById('stopBtn').style.display = 'inline-block';

                    this.stopCapture = false;
                    this.pendingConfirm = {};
                    this.captureLoop();
                } catch (error) {
                    statusDiv.innerHTML = `<div class="log-entry err"><span>❌ Tidak bisa akses kamera: ${this.escapeHtml(error.message)}</span></div>`;
                }
            },

            stopCamera() {
                this.stopCapture = true;
                const video = document.getElementById('camera');
                if (video && video.srcObject) {
                    video.srcObject.getTracks().forEach((track) => track.stop());
                    video.srcObject = null;
                }
                const placeholder = document.getElementById('scannerPlaceholder');
                const scanLine = document.getElementById('scanLine');
                const stopBtn = document.getElementById('stopBtn');
                if (placeholder) placeholder.style.display = 'flex';
                if (scanLine) scanLine.style.display = 'none';
                if (stopBtn) stopBtn.style.display = 'none';

                const overlay = document.getElementById('overlay');
                if (overlay) overlay.getContext('2d').clearRect(0, 0, overlay.width, overlay.height);
            },

            async captureLoop() {
                if (this.stopCapture) return;
                const video = document.getElementById('camera');
                const overlay = document.getElementById('overlay');

                if (video && overlay && video.videoWidth && this.faceMatcher) {
                    overlay.width = video.videoWidth;
                    overlay.height = video.videoHeight;

                    try {
                        const detections = await faceapi
                            .detectAllFaces(video, new faceapi.TinyFaceDetectorOptions({ inputSize: CONFIG.DETECT_INPUT_SIZE }))
                            .withFaceLandmarks()
                            .withFaceDescriptors();

                        const matches = detections.map((det) => this.faceMatcher.findBestMatch(det.descriptor));
                        this.drawDetections(overlay, detections, matches);

                        const seenThisFrame = new Set();
                        matches.forEach((match) => {
                            if (match.label !== 'unknown') {
                                seenThisFrame.add(match.label);
                                this.handleMatch(match);
                            }
                        });
                        Object.keys(this.pendingConfirm).forEach((id) => {
                            if (!seenThisFrame.has(id)) this.pendingConfirm[id] = 0;
                        });
                    } catch (err) {
                        console.error('Detection error:', err);
                    }
                }

                if (!this.stopCapture) setTimeout(() => this.captureLoop(), CONFIG.LOOP_DELAY_MS);
            },

            drawDetections(overlay, detections, matches) {
                const ctx = overlay.getContext('2d');
                ctx.clearRect(0, 0, overlay.width, overlay.height);

                detections.forEach((det, i) => {
                    const match = matches[i];
                    const isKnown = match.label !== 'unknown';
                    const box = det.detection.box;
                    const color = isKnown ? '#3F7856' : '#B23A2E';
                    const person = isKnown ? this.peopleMap[match.label] : null;
                    const label = person ? person.nama : 'Tidak dikenali';

                    ctx.strokeStyle = color;
                    ctx.lineWidth = 3;
                    ctx.strokeRect(box.x, box.y, box.width, box.height);

                    ctx.font = '600 15px "Plus Jakarta Sans", sans-serif';
                    const textY = box.y > 22 ? box.y - 8 : box.y + box.height + 20;
                    const textWidth = ctx.measureText(label).width;
                    ctx.fillStyle = color;
                    ctx.fillRect(box.x, textY - 16, textWidth + 12, 22);
                    ctx.fillStyle = '#fff';
                    ctx.fillText(label, box.x + 6, textY - 1);
                });
            },

            handleMatch(match) {
                const anggotaId = match.label;
                this.pendingConfirm[anggotaId] = (this.pendingConfirm[anggotaId] || 0) + 1;

                if (this.pendingConfirm[anggotaId] >= CONFIG.CONFIRM_FRAMES) {
                    this.pendingConfirm[anggotaId] = 0;
                    const now = Date.now();
                    if (!this.lastRecognized[anggotaId] || now - this.lastRecognized[anggotaId] > CONFIG.COOLDOWN_MS) {
                        this.lastRecognized[anggotaId] = now;
                        const confidence = Math.max(0, Math.min(100, (1 - match.distance) * 100));
                        this.recordAttendance(anggotaId, confidence);
                    }
                }
            },

            async recordAttendance(anggotaId, confidence) {
                const person = this.peopleMap[anggotaId];
                if (!person) return;
                const payload = { anggota_id: Number(anggotaId), confidence };

                try {
                    const response = await this.apiFetch('/attendance/check', { method: 'POST', body: JSON.stringify(payload) });
                    const data = await response.json();
                    const statusType = data.success ? 'ok' : 'dup';
                    this.updateIdCard(person, statusType);
                    this.pushAttendanceLog(statusType, data.message, confidence);
                    if (data.success) { this.playBeep(800, 200); this.loadReport(); }
                } catch (error) {
                    if (error.message === 'UNAUTHORIZED') return;
                    this.queueOffline(payload);
                    this.updateIdCard(person, 'offline');
                    this.pushAttendanceLog('offline', person.nama + ' tersimpan offline, menunggu koneksi', confidence);
                }
            },

            updateIdCard(person, statusType) {
                const body = document.getElementById('idCardBody');
                if (!body || !person) return;

                const idLabel = person.tipe === 'siswa' ? 'NISN' : 'ID Pegawai';
                const idValue = person.tipe === 'siswa' ? (person.nisn || '-') : (person.id_pegawai || '-');
                const kelasLabel = person.tipe === 'siswa' ? 'Kelas' : 'Jabatan';
                const statusLabel = statusType === 'ok' ? '✅ Absen Tercatat' : statusType === 'offline' ? '⏳ Menunggu Koneksi' : 'ℹ️ Sudah Absen';
                const statusClass = statusType === 'ok' ? 'ok' : 'dup';
                const time = new Date().toLocaleTimeString('id-ID');

                body.innerHTML = `
                    ${person.foto ? `<img src="${person.foto}" class="id-photo" alt="">` : `<div class="id-photo-fallback">${this.initials(person.nama)}</div>`}
                    <div class="id-card-name">${this.escapeHtml(person.nama)}</div>
                    <span class="id-card-status ${statusClass}">${statusLabel}</span>
                    <div class="id-card-meta">
                        <div class="id-card-meta-row"><span class="label">${idLabel}</span><span class="value">${this.escapeHtml(idValue)}</span></div>
                        <div class="id-card-meta-row"><span class="label">${kelasLabel}</span><span class="value">${this.escapeHtml(person.kelas_jabatan || '-')}</span></div>
                        <div class="id-card-meta-row"><span class="label">Jam</span><span class="value">${time}</span></div>
                    </div>
                `;
            },

            pushAttendanceLog(type, message, confidence) {
                const statusDiv = document.getElementById('attendanceStatus');
                if (!statusDiv) return;

                const time = new Date().toLocaleTimeString('id-ID');
                const cls = type === 'ok' ? 'ok' : type === 'err' ? 'err' : 'dup';
                const icon = type === 'ok' ? '✅' : type === 'offline' ? '⏳' : type === 'err' ? '❌' : 'ℹ️';
                const confText = typeof confidence === 'number' ? ` <span class="mono" style="opacity:0.7;">(${confidence.toFixed(1)}%)</span>` : '';

                const entry = document.createElement('div');
                entry.className = 'log-entry ' + cls;
                entry.innerHTML = `<span>${icon} ${this.escapeHtml(message || '')}${confText}</span><span class="log-time">${time}</span>`;
                statusDiv.prepend(entry);

                while (statusDiv.children.length > 10) statusDiv.removeChild(statusDiv.lastChild);
            },

            // ---- Antrian offline: kalau internet putus pas scan, simpan dulu & kirim ulang otomatis ----
            queueOffline(payload) {
                try {
                    const queue = JSON.parse(localStorage.getItem('offlineQueue') || '[]');
                    queue.push(payload);
                    localStorage.setItem('offlineQueue', JSON.stringify(queue));
                    this.updateOfflineBadge();
                } catch (e) { /* localStorage penuh/gagal -- tidak fatal */ }
            },

            async flushOfflineQueue() {
                if (!this.session) return;
                let queue;
                try {
                    queue = JSON.parse(localStorage.getItem('offlineQueue') || '[]');
                } catch (e) { return; }
                if (!queue.length) return;

                const remaining = [];
                for (const item of queue) {
                    try {
                        const response = await this.apiFetch('/attendance/check', { method: 'POST', body: JSON.stringify(item) });
                        if (!response.ok) remaining.push(item);
                    } catch (error) {
                        remaining.push(item);
                        if (error.message === 'UNAUTHORIZED') break;
                    }
                }
                localStorage.setItem('offlineQueue', JSON.stringify(remaining));
                this.updateOfflineBadge();
                if (remaining.length < queue.length) this.loadReport();
            },

            updateOfflineBadge() {
                const badge = document.getElementById('offlineBadge');
                if (!badge) return;
                let queue = [];
                try { queue = JSON.parse(localStorage.getItem('offlineQueue') || '[]'); } catch (e) {}
                if (queue.length > 0) {
                    badge.style.display = 'block';
                    badge.textContent = '⏳ ' + queue.length + ' absen menunggu koneksi internet';
                } else {
                    badge.style.display = 'none';
                }
            },

            playBeep(frequency, duration) {
                try {
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    oscillator.frequency.value = frequency;
                    oscillator.type = 'sine';
                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration / 1000);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + duration / 1000);
                } catch (e) { /* audio tidak didukung, abaikan */ }
            },

            // ============ TAB: REPORT ============
            renderReportTab() {
                return `
                    <div class="filter-chip-row" style="margin-bottom:1.25rem;">
                        <button class="filter-chip active" id="modeHarianBtn" onclick="app.setReportMode('harian')">📅 Hari Ini</button>
                        <button class="filter-chip" id="modeRekapBtn" onclick="app.setReportMode('rekap')">📈 Rekap &amp; Unduh</button>
                    </div>

                    <div id="reportHarianView">
                        <div class="card">
                            <div class="summary-strip" id="reportSummary"></div>
                            <div class="table-toolbar">
                                <input type="text" class="search-input" placeholder="Cari nama / NISN / ID Pegawai..." oninput="app.setReportSearch(this.value)">
                                <div class="filter-chip-row" id="reportFilterChips">
                                    <button class="filter-chip active" data-tipe="" onclick="app.setReportFilter('')">Semua</button>
                                    <button class="filter-chip" data-tipe="siswa" onclick="app.setReportFilter('siswa')">Siswa</button>
                                    <button class="filter-chip" data-tipe="guru" onclick="app.setReportFilter('guru')">Guru</button>
                                    <button class="filter-chip" data-tipe="karyawan" onclick="app.setReportFilter('karyawan')">Karyawan</button>
                                </div>
                                <button class="btn btn-secondary btn-outline-w" onclick="app.loadReport()">🔄 Refresh</button>
                            </div>
                            <div style="overflow-x:auto;">
                                <table>
                                    <thead>
                                        <tr><th>Tipe</th><th>Nama</th><th>NISN / ID Pegawai</th><th>Kelas / Jabatan</th><th>Status</th><th>Jam Masuk</th><th>Confidence</th></tr>
                                    </thead>
                                    <tbody id="reportTable"></tbody>
                                </table>
                            </div>
                            <div class="pagination" id="reportPagination"></div>
                        </div>
                    </div>

                    <div id="reportRekapView" style="display:none;">
                        <div class="card card-pad" style="margin-bottom:1.5rem;">
                            <h3>Rekap Periode</h3>
                            <div class="form-row">
                                <div class="form-group"><label>Dari Tanggal</label><input type="date" id="rekapStart" onchange="app.loadRekap()"></div>
                                <div class="form-group"><label>Sampai Tanggal</label><input type="date" id="rekapEnd" onchange="app.loadRekap()"></div>
                            </div>
                            <div class="filter-chip-row" style="margin-bottom:1rem;">
                                <button class="filter-chip" onclick="app.setRekapPreset('hari', event)">Hari Ini</button>
                                <button class="filter-chip" onclick="app.setRekapPreset('minggu', event)">Minggu Ini</button>
                                <button class="filter-chip active" onclick="app.setRekapPreset('bulan', event)">Bulan Ini</button>
                            </div>
                            <div style="display:flex; gap:0.6rem; flex-wrap:wrap;">
                                <button class="btn btn-secondary btn-outline-w" onclick="app.loadRekap()">👁️ Lihat Rekap</button>
                                <button class="btn btn-gold btn-outline-w" onclick="app.downloadRekap()" id="downloadRekapBtn">⬇️ Unduh Excel (.xlsx)</button>
                            </div>
                            <p style="font-size:0.78rem; color:var(--ink-400); margin-top:0.75rem;">File Excel berisi 2 sheet: <strong>Rekap Ringkasan</strong> (total hadir per orang) & <strong>Detail Absensi</strong> (tiap kejadian absen beserta jam dan confidence). "Hari Kerja" dihitung Senin-Jumat dan belum memperhitungkan hari libur/libur sekolah.</p>
                        </div>
                        <div class="card">
                            <div style="overflow-x:auto;">
                                <table>
                                    <thead>
                                        <tr><th>Tipe</th><th>Nama</th><th>NISN / ID Pegawai</th><th>Kelas / Jabatan</th><th>Hadir</th><th>Hari Kerja</th><th>%</th></tr>
                                    </thead>
                                    <tbody id="rekapTable"><tr><td colspan="7" style="text-align:center; padding:2rem; color:var(--ink-400);">Pilih tanggal, lalu klik "Lihat Rekap"</td></tr></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `;
            },

            setReportMode(mode) {
                this.reportMode = mode;
                document.getElementById('modeHarianBtn').classList.toggle('active', mode === 'harian');
                document.getElementById('modeRekapBtn').classList.toggle('active', mode === 'rekap');
                document.getElementById('reportHarianView').style.display = mode === 'harian' ? 'block' : 'none';
                document.getElementById('reportRekapView').style.display = mode === 'rekap' ? 'block' : 'none';
                if (mode === 'rekap' && !document.getElementById('rekapStart').value) {
                    this.setRekapPreset('bulan');
                }
            },

            toDateInputValue(date) {
                const d = new Date(date);
                const offset = d.getTimezoneOffset();
                const local = new Date(d.getTime() - offset * 60000);
                return local.toISOString().split('T')[0];
            },

            setRekapPreset(preset, evt) {
                document.querySelectorAll('#reportRekapView .filter-chip').forEach((el) => el.classList.remove('active'));
                if (evt && evt.target) evt.target.classList.add('active');

                const today = new Date();
                let start, end = this.toDateInputValue(today);
                if (preset === 'hari') {
                    start = end;
                } else if (preset === 'minggu') {
                    const d = new Date(today);
                    const day = d.getDay();
                    const diffToMonday = day === 0 ? 6 : day - 1;
                    d.setDate(d.getDate() - diffToMonday);
                    start = this.toDateInputValue(d);
                } else {
                    start = this.toDateInputValue(new Date(today.getFullYear(), today.getMonth(), 1));
                }
                document.getElementById('rekapStart').value = start;
                document.getElementById('rekapEnd').value = end;
                this.loadRekap();
            },

            async loadRekap() {
                const start = document.getElementById('rekapStart').value;
                const end = document.getElementById('rekapEnd').value;
                const tbody = document.getElementById('rekapTable');
                if (!start || !end || !tbody) return;

                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:1.5rem; color:var(--ink-400);">⏳ Memuat...</td></tr>`;
                try {
                    const params = new URLSearchParams({ start, end });
                    const response = await this.apiFetch('/attendance/rekap?' + params.toString());
                    const result = await response.json();

                    tbody.innerHTML = result.data.map((r) => `
                        <tr>
                            <td><span class="tipe-badge tipe-${r.tipe}">${r.tipe}</span></td>
                            <td>${this.escapeHtml(r.nama)}</td>
                            <td class="mono">${this.escapeHtml((r.tipe === 'siswa' ? r.nisn : r.id_pegawai) || '-')}</td>
                            <td>${this.escapeHtml(r.kelas_jabatan || '-')}</td>
                            <td class="mono">${r.jumlah_hadir}</td>
                            <td class="mono">${result.workingDays}</td>
                            <td class="mono">${result.workingDays > 0 ? ((r.jumlah_hadir / result.workingDays) * 100).toFixed(1) + '%' : '-'}</td>
                        </tr>
                    `).join('') || `<tr><td colspan="7" style="text-align:center; padding:2rem; color:var(--ink-400);">Tidak ada data</td></tr>`;
                } catch (error) {
                    if (error.message !== 'UNAUTHORIZED') console.error('Error loading rekap:', error);
                }
            },

            async downloadRekap() {
                const start = document.getElementById('rekapStart').value;
                const end = document.getElementById('rekapEnd').value;
                if (!start || !end) { alert('Pilih tanggal dulu'); return; }

                const btn = document.getElementById('downloadRekapBtn');
                const originalText = btn ? btn.textContent : '';
                if (btn) { btn.disabled = true; btn.textContent = '⏳ Menyiapkan file...'; }

                try {
                    const params = new URLSearchParams({ start, end });
                    const response = await this.apiFetch('/attendance/export?' + params.toString());
                    if (!response.ok) {
                        const err = await response.json().catch(() => ({}));
                        throw new Error(err.error || 'Gagal membuat file export');
                    }
                    const blob = await response.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `Rekap_Absensi_${start}_${end}.xlsx`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                } catch (error) {
                    if (error.message !== 'UNAUTHORIZED') alert('Gagal unduh: ' + error.message);
                } finally {
                    if (btn) { btn.disabled = false; btn.textContent = originalText; }
                }
            },

            async loadReport() {
                const tbody = document.getElementById('reportTable');
                if (!tbody) return;
                try {
                    const params = new URLSearchParams({
                        search: this.reportSearch, tipe: this.reportTipeFilter,
                        page: this.reportPage, limit: 30,
                    });
                    const response = await this.apiFetch('/attendance/report?' + params.toString());
                    const result = await response.json();

                    const summaryEl = document.getElementById('reportSummary');
                    if (summaryEl) {
                        summaryEl.innerHTML = `
                            <div class="summary-box"><div class="num">${result.hadir}</div><div class="lbl">Hadir Hari Ini</div></div>
                            <div class="summary-box"><div class="num">${result.total}</div><div class="lbl">Total Terdaftar</div></div>
                            <div class="summary-box"><div class="num">${Math.max(0, result.total - result.hadir)}</div><div class="lbl">Belum Absen</div></div>
                        `;
                    }

                    tbody.innerHTML = result.data.map((r) => `
                        <tr>
                            <td><span class="tipe-badge tipe-${r.tipe}">${r.tipe}</span></td>
                            <td>${this.escapeHtml(r.nama)}</td>
                            <td class="mono">${this.escapeHtml((r.tipe === 'siswa' ? r.nisn : r.id_pegawai) || '-')}</td>
                            <td>${this.escapeHtml(r.kelas_jabatan || '-')}</td>
                            <td><span class="badge ${r.status === 'Hadir' ? 'badge-present' : 'badge-absent'}">${r.status}</span></td>
                            <td class="mono">${r.time_in || '-'}</td>
                            <td class="mono">${r.confidence != null ? Number(r.confidence).toFixed(1) + '%' : '-'}</td>
                        </tr>
                    `).join('') || `<tr><td colspan="7" style="text-align:center; color:var(--ink-400); padding:2rem;">Tidak ada data</td></tr>`;

                    this.renderPagination('reportPagination', result, (page) => { this.reportPage = page; this.loadReport(); });
                } catch (error) {
                    if (error.message !== 'UNAUTHORIZED') console.error('Error loading report:', error);
                }
            },

            setReportSearch(val) {
                this.reportSearch = val;
                this.reportPage = 1;
                clearTimeout(this._reportSearchTimer);
                this._reportSearchTimer = setTimeout(() => this.loadReport(), 350);
            },

            setReportFilter(tipe) {
                this.reportTipeFilter = tipe;
                this.reportPage = 1;
                document.querySelectorAll('#reportFilterChips .filter-chip').forEach((el) => {
                    el.classList.toggle('active', el.dataset.tipe === tipe);
                });
                this.loadReport();
            },
        };

        window.addEventListener('DOMContentLoaded', () => app.init());
        window.addEventListener('online', () => app.flushOfflineQueue());
    </script>
</body>
</html>
